name: setup-parity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-wasm-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check host workspace
        run: cargo check --workspace

      - name: Check WASM webapp
        run: cargo check -p webapp --target wasm32-unknown-unknown

  python-free-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure no Python setup files
        run: |
          if git ls-files '*.py' | grep -q .; then
            echo "Python files detected in repository."
            exit 1
          fi

      - name: Ensure setup docs/scripts avoid Python commands
        run: |
          if grep -RInE '(^|[[:space:]])(python3?|pip3?)([[:space:]]|$)' README.md scripts .cargo 2>/dev/null; then
            echo "Python tooling references found in setup-relevant files."
            exit 1
          fi
